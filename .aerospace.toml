config-version = 2
start-at-login = true

after-startup-command = [
  'exec-and-forget sketchybar',
  'exec-and-forget borders active_color=0xffe1e3e4 inactive_color=0xff494d64 width=5.0',
  'exec-and-forget open -a /Applications/WezTerm.app',
  'exec-and-forget open -a /Applications/LibreWolf.app',
  # 'exec-and-forget open -a /Applications/Google\ Chrome.app',
  # 'exec-and-forget open -a /Applications/Xcode.app',
  # 'exec-and-forget open -a /Applications/Simulator.app',
  # 'exec-and-forget open -a /Applications/Sublime\ Merge.app',
  # 'exec-and-forget open -a /Applications/Docker.app'
]

exec-on-workspace-change = ['/bin/bash', '-c',
    'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]

# Keep behavior predictable and minimal.
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Keep these workspaces alive even when empty.
persistent-workspaces = ['1', '2', '3', '4', '5']

[[on-window-detected]]
if.app-id = 'com.github.wez.wezterm'
run = ['move-node-to-workspace 1', 'layout tiling']

[[on-window-detected]]
if.app-id = 'com.apple.dt.Xcode'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'com.apple.iphonesimulator'
if.window-title-regex-substring = 'iPhone|iPad|Apple Watch|visionOS'
run = ['move-node-to-workspace 3', 'layout tiling']

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.mail'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.SystemSettings'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'org.mozilla.librewolf'
run = ['move-node-to-workspace 2']

[[on-window-detected]]
if.app-id = 'com.sublimemerge'
run = ['move-node-to-workspace 4', 'layout floating']

[[on-window-detected]]
if.app-id = 'com.electron.dockerdesktop'
run = ['move-node-to-workspace 4', 'layout floating']

[[on-window-detected]]
if.app-id = 'com.docker.docker'
run = ['move-node-to-workspace 4', 'layout floating']

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 16
inner.vertical = 16
outer.left = 16
outer.bottom = 16
outer.top = 56
outer.right = 16

[mode.main.binding]
# Focus — Caps Lock hold (ctrl-alt) + n m , .
ctrl-alt-n = 'focus left'
ctrl-alt-m = 'focus down'
ctrl-alt-comma = 'focus up'
ctrl-alt-period = 'focus right'
alt-backtick = 'focus-back-and-forth'

# Move window — Caps Lock hold (ctrl-alt) + u i o p
ctrl-alt-u = 'move left'
ctrl-alt-i = 'move down'
ctrl-alt-o = 'move up'
ctrl-alt-p = 'move right'

# Resize
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# Workspace — Caps Lock hold (ctrl-alt) + homerow
# Sağ el homerow: h,j,k,l,;
ctrl-alt-h = 'workspace 2'
ctrl-alt-j = 'workspace 1'
ctrl-alt-k = 'workspace 3'
ctrl-alt-l = 'workspace 4'
ctrl-alt-semicolon = 'workspace 5'
# workspace 6-9 removed — ctrl-alt-u/i/o/p repurposed for move

alt-tab = 'focus-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# Layout
alt-ctrl-f = 'layout floating tiling'
alt-shift-enter = 'fullscreen'
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# Service mode entry — Caps Lock + space
ctrl-alt-space = 'mode service'

[mode.service.binding]
# Move window to workspace + auto exit to main mode
# Both bare key (Caps Lock released) and ctrl-alt-key (Caps Lock held) variants
j = ['move-node-to-workspace 1 --focus-follows-window', 'mode main']
ctrl-alt-h = ['move-node-to-workspace 1 --focus-follows-window', 'mode main']
h = ['move-node-to-workspace 2 --focus-follows-window', 'mode main']
ctrl-alt-j = ['move-node-to-workspace 2 --focus-follows-window', 'mode main']
k = ['move-node-to-workspace 3 --focus-follows-window', 'mode main']
ctrl-alt-k = ['move-node-to-workspace 3 --focus-follows-window', 'mode main']
l = ['move-node-to-workspace 4 --focus-follows-window', 'mode main']
ctrl-alt-l = ['move-node-to-workspace 4 --focus-follows-window', 'mode main']
semicolon = ['move-node-to-workspace 5 --focus-follows-window', 'mode main']
ctrl-alt-semicolon = ['move-node-to-workspace 5 --focus-follows-window', 'mode main']
# workspace 6-9 service mode moves removed (uiop repurposed for focus move)

# Regular service mode commands
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

[workspace-to-monitor-force-assignment]
1 = 'main'
2 = 'secondary'
3 = 'main'
4 = 'main'
5 = 'main'
